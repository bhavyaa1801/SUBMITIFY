{% for exp in experiments %}

<div class="experiment">

<h1>Experiment {{ exp.number }}</h1>

<h2>Aim</h2>
<p>{{ exp.aim }}</p>

<h2>Algorithm</h2>
<pre class="algorithm">{{ exp.algorithm }}</pre>

<h2>Program</h2>
<pre class="code">{{ exp.code | e}}</pre>

<h2>Output</h2>
<pre class="output">{{ exp.output }}</pre>

<!-- <h2>Result</h2>
<p>{{ exp.result }}</p> -->

</div>

<div style="page-break-after: always;"></div>

{% endfor %}
